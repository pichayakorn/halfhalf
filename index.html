<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HalfHalf</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>
    // Theme initialization (prevents theme flash)
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const queryTheme = urlParams.get('theme');
      const savedTheme = localStorage.getItem('halfhalf_theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (queryTheme === 'dark' || (queryTheme !== 'light' && (savedTheme === 'dark' || (!savedTheme && prefersDark)))) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <!-- Favicon / App Icon -->
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f5f5f7">
  <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0b0f19" media="(prefers-color-scheme: dark)">
  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="HalfHalf">
  <link rel="apple-touch-icon" href="icon-solid.png">
  <!-- Lucide Icons (CDN) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-color: #f5f5f7; /* Softer, warmer light gray background */
      --card-bg: #ffffff;
      --card-border: #e5e7eb; /* Softer border */
      --text-main: #1d1d1f; /* Softer, less harsh main text */
      --text-muted: #86868b; /* Softer muted text */
      --gov-color: #0d9488; /* Teal from Glass variant */
      --gov-bg-light: rgba(13, 148, 136, 0.05); /* Softer government block background */
      --user-color: #d97706; /* Warm Amber/Orange */
      --user-bg-light: rgba(217, 119, 6, 0.05); /* Softer user block background */
      --accent: #0d9488;
      --input-bg: #f0f2f5; /* Softer inputs background */
      --gov-border: rgba(13, 148, 136, 0.1);
      --user-border: rgba(217, 119, 6, 0.1);
      --gov-border-dashed: rgba(13, 148, 136, 0.3);
    }

    [data-theme="dark"] {
      --bg-color: #0b0f19; /* Softer modern deep slate */
      --card-bg: #151d30; /* Premium card slate blue */
      --card-border: #243049; /* Softer border */
      --text-main: #f8fafc; /* Crisp readable text */
      --text-muted: #94a3b8; /* Lighter slate muted text for contrast */
      --gov-color: #00f2fe;
      --gov-bg-light: rgba(0, 242, 254, 0.1);
      --user-color: #ff8c00;
      --user-bg-light: rgba(255, 140, 0, 0.1);
      --accent: #00f2fe;
      --input-bg: #1e293b;
      --gov-border: rgba(0, 242, 254, 0.1);
      --user-border: rgba(255, 140, 0, 0.1);
      --gov-border-dashed: rgba(0, 242, 254, 0.4);
    }

    [data-theme="dark"] .app-container {
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 1px 1px rgba(255, 255, 255, 0.05);
    }



    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: calc(env(safe-area-inset-top, 24px) + 36px) 16px 24px 16px;
    }

    .app-container {
      width: 100%;
      max-width: 440px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 36px 30px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04); /* Softer, premium drop shadow */
      position: relative;
      overflow: hidden;
    }



    .header {
      margin-bottom: 24px;
    }

    .header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .header h1 {
      font-family: 'Inter', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--text-main);
      letter-spacing: -0.02em;
    }

    /* Subsidy Balance Box */
    .balance-box {
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--input-bg);
    }

    .bal-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .bal-title {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .bal-val-wrapper {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-top: 2px;
    }

    .bal-currency {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--gov-color);
    }

    .bal-val-input {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--gov-color);
      background: transparent;
      border: none;
      border-bottom: 1px dashed var(--gov-border-dashed);
      outline: none;
      width: 75px;
      font-family: inherit;
      padding: 0;
      transition: border-color 0.2s ease;
    }

    .bal-val-input:focus {
      border-bottom-color: var(--gov-color);
    }

    .bal-val-input::-webkit-outer-spin-button,
    .bal-val-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .bal-val-input[type=number] {
      -moz-appearance: textfield;
    }

    /* Settings section */
    .settings-section {
      background: var(--input-bg);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .settings-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .setting-group {
      margin-bottom: 0;
    }

    .setting-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .cap-input-wrapper {
      display: flex;
      align-items: center;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 8px 12px;
    }

    .cap-input-wrapper span {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-right: 4px;
    }

    .cap-input {
      border: none;
      background: transparent;
      outline: none;
      color: var(--text-main);
      font-size: 0.8125rem;
      font-weight: 600;
      width: 100%;
    }
    .cap-input::-webkit-outer-spin-button,
    .cap-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .cap-input[type=number] {
      -moz-appearance: textfield;
    }

    .bal-limit {
      font-size: 0.6875rem;
      color: var(--text-muted);
      text-align: right;
    }

    .bal-limit span {
      font-weight: 600;
      color: var(--text-main);
    }



    /* Input styling */
    .input-section {
      margin-bottom: 24px;
    }

    .input-container {
      text-align: center;
      margin-bottom: 16px;
    }

    .input-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      display: block;
    }

    .price-input-wrapper {
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      border-bottom: 2px solid var(--text-main);
      padding: 8px 0;
      width: 100%;
      max-width: 260px;
      transition: border-color 0.2s ease;
    }

    .price-input-wrapper:focus-within {
      border-color: var(--gov-color);
    }

    .currency-symbol {
      font-size: 2rem;
      font-family: 'Instrument Serif', serif;
      color: var(--text-muted);
      margin-right: 4px;
    }

    .price-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 2.25rem;
      font-weight: 500;
      width: 160px;
      text-align: center;
    }

    .price-input::placeholder {
      color: #cbd5e1;
    }

    .price-input::-webkit-outer-spin-button,
    .price-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .price-input[type=number] {
      -moz-appearance: textfield;
    }

    /* Note and Presets */
    .note-wrapper {
      margin-top: 14px;
    }

    .note-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text-main);
      font-size: 0.8125rem;
      outline: none;
      text-align: center;
      transition: all 0.2s ease;
    }

    .note-input:focus {
      background: var(--card-bg);
      border-color: var(--card-border);
    }



    /* Results Block */
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px; /* Slightly larger margin to accommodate absolute cap-alert */
      position: relative;
    }

    .result-box {
      border-radius: 12px;
      padding: 18px 12px;
      text-align: center;
    }

    .result-box.gov {
      background-color: var(--gov-bg-light);
      border: 1px solid var(--gov-border);
    }

    .result-box.user {
      background-color: var(--user-bg-light);
      border: 1px solid var(--user-border);
    }

    .result-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .result-box.gov .result-label { color: var(--gov-color); }
    .result-box.user .result-label { color: var(--user-color); }

    .result-val-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .result-val-wrapper span {
      font-family: 'Instrument Serif', serif;
      font-size: 1.5rem;
      margin-right: 2px;
    }

    .result-val-wrapper.gov span { color: var(--gov-color); }
    .result-val-wrapper.user span { color: var(--user-color); }

    .result-input {
      background: transparent;
      border: none;
      outline: none;
      font-size: 1.4rem;
      font-weight: 600;
      width: 100%;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .result-input.gov { color: var(--gov-color); }
    .result-input.user { color: var(--user-color); }

    .result-input::-webkit-outer-spin-button,
    .result-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .result-input[type=number] {
      -moz-appearance: textfield;
    }

    .cap-alert {
      position: absolute;
      bottom: -18px; /* Float alert inside the margin space below results-grid */
      left: 0;
      right: 0;
      font-size: 0.72rem;
      color: var(--user-color);
      text-align: center;
      font-style: italic;
      white-space: nowrap;
      pointer-events: none;
    }

    /* Visual slider segment */
    .visual-split {
      height: 6px;
      border-radius: 10px;
      background: var(--input-bg);
      display: flex;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .split-gov {
      width: 60%;
      background-color: var(--gov-color);
    }

    .split-user {
      width: 40%;
      background-color: var(--user-color);
    }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .btn {
      flex: 1;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--text-main);
      color: var(--card-bg);
      border: none;
    }

    .btn-primary:hover {
      background: #1e293b;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-muted);
    }

    .btn-secondary:hover {
      border-color: var(--text-main);
      color: var(--text-main);
    }

    /* History section */
    .history-section {
      border-top: 1px solid var(--card-border);
      padding-top: 24px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .history-title {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .history-actions {
      display: flex;
      gap: 6px;
    }

    .action-icon-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s ease;
    }

    .action-icon-btn:hover {
      color: var(--text-main);
    }

    /* Search logs */
    .search-container {
      position: relative;
      margin-bottom: 12px;
    }

    .search-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 6px 10px 6px 28px;
      font-size: 0.75rem;
      color: var(--text-main);
      outline: none;
    }

    .search-input:focus {
      background: var(--card-bg);
      border-color: var(--card-border);
    }

    .search-icon {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 12px;
      height: 12px;
    }

    /* Log Items */
    .log-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* History Drawer sliding out */
    .history-drawer {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      background: var(--card-bg);
      border-left: 1px solid var(--card-border);
      border-radius: 16px;
      z-index: 100;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      padding: 36px 30px;
      box-sizing: border-box;
    }

    .history-drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 12px;
    }

    .drawer-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .drawer-close-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      transition: color 0.2s ease;
    }

    .drawer-close-btn:hover {
      color: var(--user-color);
    }

    .hamburger-btn,
    .theme-toggle-btn {
      background: transparent;
      border: 1px solid var(--card-border);
      border-radius: 50%;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .hamburger-btn:hover,
    .theme-toggle-btn:hover {
      border-color: var(--text-main);
      color: var(--text-main);
    }

    /* Theme Icon Toggling */
    [data-theme="dark"] .theme-icon-light {
      display: block !important;
    }
    [data-theme="dark"] .theme-icon-dark {
      display: none !important;
    }
    .theme-icon-light {
      display: none;
    }
    .theme-icon-dark {
      display: block;
    }

    .log-list::-webkit-scrollbar {
      width: 3px;
    }

    .log-list::-webkit-scrollbar-thumb {
      background: var(--card-border);
      border-radius: 2px;
    }

    .log-item {
      padding: 10px;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8125rem;
      transition: border-color 0.2s ease;
    }

    .log-item:hover {
      border-color: var(--text-main);
    }

    .log-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
      flex: 1;
    }

    .log-orig-price {
      font-weight: 700;
      font-size: 0.875rem;
      color: var(--text-main);
      white-space: nowrap;
    }

    .log-note {
      font-size: 0.75rem;
      color: var(--text-muted);
      max-width: 180px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 2px;
    }

    .log-splits {
      font-size: 0.7rem;
      color: var(--text-muted);
      display: flex;
      gap: 8px;
      white-space: nowrap;
    }

    .log-splits span:first-child { color: var(--gov-color); font-weight: 500; }
    .log-splits span:last-child { color: var(--user-color); font-weight: 500; }

    .log-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .log-date {
      font-size: 0.7rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .log-delete {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: color 0.2s ease;
    }

    .log-delete:hover {
      color: var(--user-color);
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 24px;
    }

    @media (max-width: 480px) {
      body {
        padding: 0;
        background-color: var(--card-bg);
        align-items: stretch;
        overflow: hidden;
      }

      .app-container {
        height: 100vh;
        height: -webkit-fill-available;
        border: none;
        border-radius: 0;
        box-shadow: none;
        padding: 20px 20px 24px 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow: hidden;
      }

      .header {
        margin-top: 12px;
        margin-bottom: 16px;
      }

      .balance-box {
        margin-bottom: 16px;
        padding: 12px 14px;
      }

      .input-section {
        margin-bottom: 16px;
      }

      .visual-split {
        margin-bottom: 16px;
      }

      .results-grid {
        margin-bottom: 24px; /* Maintain 24px on mobile to prevent overlapping absolute cap-alert */
        gap: 12px;
      }

      .actions {
        margin-bottom: 0;
      }

      .history-drawer {
        border-radius: 0;
        border-left: none;
        padding: 24px 20px;
      }
    }

    /* Embedded Numpad Styles */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 20px;
      margin-bottom: 20px;
      width: 100%;
    }

    .numpad-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      font-size: 1.35rem;
      font-weight: 600;
      padding: 12px 0;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.1s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      outline: none;
    }

    .numpad-btn:active {
      background: var(--card-border);
      transform: scale(0.96);
    }

    @media (hover: hover) {
      .numpad-btn:hover {
        background: var(--input-bg);
      }
    }

    /* Highlight active field border */
    .price-input-wrapper.active-field {
      border-color: var(--gov-color) !important;
    }
    .bal-val-input.active-field {
      border-bottom-color: var(--gov-color) !important;
    }
    .result-val-wrapper.active-field {
      border-bottom-color: var(--gov-color) !important;
    }
    
    /* Result inputs active border helper */
    .result-val-wrapper {
      border-bottom: 2px solid transparent;
      transition: border-color 0.2s ease;
    }
  </style>
</head>
<body>



  <div class="app-container">
    <div class="header">
      <div class="header-top">
        <h1>HalfHalf</h1>
        <div style="display: flex; gap: 8px;">
          <button class="theme-toggle-btn" id="theme-toggle-btn" title="Toggle Theme">
            <i data-lucide="sun" class="theme-icon-light" style="width: 16px; height: 16px;"></i>
            <i data-lucide="moon" class="theme-icon-dark" style="width: 16px; height: 16px;"></i>
          </button>
          <button class="hamburger-btn" id="drawer-open-btn" title="Saved Splits">
            <i data-lucide="menu" style="width: 16px; height: 16px;"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Subsidy Tracker -->
    <div class="balance-box">
      <div class="bal-left">
        <span class="bal-title">Available Subsidy</span>
        <div class="bal-val-wrapper">
          <span class="bal-currency">฿</span>
          <input type="text" id="remaining-subsidy-input" class="bal-val-input" value="200.00" inputmode="none">
        </div>
      </div>
      <div class="bal-limit">
        Optimal Limit<br>
        <span>Max: <span id="optimal-limit-val">฿333.33</span></span>
      </div>
    </div>

    <!-- Input Box -->
    <div class="input-section">
      <div class="input-container">
        <label class="input-label" for="original-price">Amount to Split (60/40 Ratio)</label>
        <div class="price-input-wrapper">
          <span class="currency-symbol">฿</span>
          <input type="text" id="original-price" class="price-input" placeholder="0.00" autofocus inputmode="none">
        </div>
      </div>
    </div>

    <!-- Visual Divider -->
    <div class="visual-split">
      <div class="split-gov" id="gov-bar-segment" style="width: 60%"></div>
      <div class="split-user" id="user-bar-segment" style="width: 40%"></div>
    </div>

    <!-- Calculated Split Boxes -->
    <div class="results-grid">
      <div class="result-box gov">
        <div class="result-label">Gov Support (60%)</div>
        <div class="result-val-wrapper gov" id="gov-val-wrapper">
          <span>฿</span>
          <input type="text" id="val-gov" class="result-input gov" placeholder="0.00" inputmode="none">
        </div>
      </div>
      <div class="result-box user">
        <div class="result-label">Your Share (40%)</div>
        <div class="result-val-wrapper user" id="user-val-wrapper">
          <span>฿</span>
          <input type="text" id="val-user" class="result-input user" placeholder="0.00" inputmode="none">
        </div>
      </div>
      <div class="cap-alert" id="cap-alert" style="display: none;">
        * Government cap reached! You pay the rest on top.
      </div>
    </div>

    <!-- Embedded Numpad -->
    <div class="numpad">
      <button class="numpad-btn" data-val="1">1</button>
      <button class="numpad-btn" data-val="2">2</button>
      <button class="numpad-btn" data-val="3">3</button>
      <button class="numpad-btn" data-val="4">4</button>
      <button class="numpad-btn" data-val="5">5</button>
      <button class="numpad-btn" data-val="6">6</button>
      <button class="numpad-btn" data-val="7">7</button>
      <button class="numpad-btn" data-val="8">8</button>
      <button class="numpad-btn" data-val="9">9</button>
      <button class="numpad-btn" data-val=".">.</button>
      <button class="numpad-btn" data-val="0">0</button>
      <button class="numpad-btn delete-btn" data-val="backspace">
        <i data-lucide="delete" style="width: 18px; height: 18px;"></i>
      </button>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-primary" onclick="saveCalculation()">
        <i data-lucide="plus" style="width: 14px; height: 14px;"></i>
        Record Split
      </button>
      <button class="btn btn-secondary" onclick="resetCalculator()">
        Reset
      </button>
    </div>



    <!-- History Drawer (Slides in from the right) -->
    <div class="history-drawer" id="history-drawer">
      <div class="drawer-header">
        <span class="drawer-title">
          <i data-lucide="history" style="width: 16px; height: 16px; color: var(--gov-color)"></i>
          Menu & Calculations
        </span>
        <button class="drawer-close-btn" id="drawer-close-btn" title="Close Drawer">
          <i data-lucide="x" style="width: 16px; height: 16px;"></i>
        </button>
      </div>



      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <span style="font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Logs Archive</span>
        <div class="history-actions" id="history-actions-bar" style="display: none; gap: 6px;">
          <button class="action-icon-btn" title="Export CSV" onclick="exportToCSV()">
            <i data-lucide="download" style="width: 14px; height: 14px;"></i>
          </button>
          <button class="action-icon-btn" title="Clear all" onclick="clearAllLogs()">
            <i data-lucide="trash-2" style="width: 14px; height: 14px;"></i>
          </button>
        </div>
      </div>

      <div class="search-container" id="search-bar-wrapper" style="display: none; margin-bottom: 12px;">
        <i data-lucide="search" class="search-icon"></i>
        <input type="text" id="search-input" class="search-input" placeholder="Search calculations..." oninput="renderHistory()">
      </div>

      <div class="log-list" id="history-list">
        <div class="empty-state">
          No records yet. Enter a value and save it.
        </div>
      </div>

      <!-- Footer / Credits -->
      <div class="app-footer" style="text-align: center; font-size: 0.7rem; color: var(--text-muted); margin-top: auto; padding-top: 12px; border-top: 1px solid var(--card-border);">
        Made by <a href="https://github.com/pichayakorn" target="_blank" rel="noopener noreferrer" style="color: var(--text-main); text-decoration: none; font-weight: 500;">pichayakorn</a>
      </div>
    </div>
  </div>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // iOS Safari Keyboard Scroll Bug Fix
    // When inputs lose focus, force the window to scroll back to top (0,0)
    // to correct the layout shift caused by the virtual keyboard.
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                  (/Mac/.test(navigator.userAgent) && navigator.maxTouchPoints > 1);
    if (isIOS) {
      document.addEventListener('focusout', (e) => {
        if (e.target.tagName === 'INPUT') {
          window.scrollTo(0, 0);
        }
      });
    }

    // App State
    let logs = JSON.parse(localStorage.getItem('halfhalf_logs')) || [];
    const ratioGov = 60; // Fixed 60%
    const ratioUser = 40; // Fixed 40%
    let dailyCap = parseFloat(localStorage.getItem('halfhalf_daily_cap')) || 200.00;
    let isCalculating = false;

    // Elements
    const priceInput = document.getElementById('original-price');
    const valGov = document.getElementById('val-gov');
    const valUser = document.getElementById('val-user');
    const historyList = document.getElementById('history-list');
    const searchInput = document.getElementById('search-input');
    const historyActionsBar = document.getElementById('history-actions-bar');
    const searchBarWrapper = document.getElementById('search-bar-wrapper');

    // Drawer Elements
    const historyDrawer = document.getElementById('history-drawer');
    const drawerOpenBtn = document.getElementById('drawer-open-btn');
    const drawerCloseBtn = document.getElementById('drawer-close-btn');

    // Tracker elements
    const remainingSubsidyInput = document.getElementById('remaining-subsidy-input');
    const optimalLimitVal = document.getElementById('optimal-limit-val');
    const capAlert = document.getElementById('cap-alert');

    // Event Listeners
    priceInput.addEventListener('input', () => {
      if (isCalculating) return;
      isCalculating = true;
      calculateFromPrice();
      isCalculating = false;
    });

    valGov.addEventListener('input', () => {
      if (isCalculating) return;
      isCalculating = true;
      calculateFromGov();
      isCalculating = false;
    });

    valUser.addEventListener('input', () => {
      if (isCalculating) return;
      isCalculating = true;
      calculateFromUser();
      isCalculating = false;
    });

    remainingSubsidyInput.addEventListener('input', () => {
      const remainingVal = parseFloat(remainingSubsidyInput.value) || 0;
      const usedToday = logs.reduce((sum, item) => sum + item.govShare, 0);
      dailyCap = remainingVal + usedToday;
      localStorage.setItem('halfhalf_daily_cap', dailyCap.toString());
      
      isCalculating = true;
      calculateFromPrice();
      isCalculating = false;

      updateTrackers();
    });

    remainingSubsidyInput.addEventListener('blur', () => {
      updateTrackers();
    });



    // Drawer Event Listeners
    drawerOpenBtn.addEventListener('click', () => {
      historyDrawer.classList.add('open');
    });

    drawerCloseBtn.addEventListener('click', () => {
      historyDrawer.classList.remove('open');
    });

    function getRemainingSubsidy() {
      const usedToday = logs.reduce((sum, item) => sum + item.govShare, 0);
      return Math.max(0, dailyCap - usedToday);
    }

    function updateCapAlert(price, rawGovShare, remainingPool) {
      const singleCapReached = rawGovShare > remainingPool || (rawGovShare === remainingPool && remainingPool > 0);
      if (price > 0 && singleCapReached) {
        const extraPay = rawGovShare - remainingPool;
        if (extraPay > 0.005) {
          capAlert.innerHTML = `* Government cap reached! You pay an extra ${formatCurrency(extraPay)} on top.`;
        } else {
          capAlert.innerHTML = `* Government cap reached! You pay the rest on top.`;
        }
        capAlert.style.display = 'block';
      } else {
        capAlert.style.display = 'none';
      }
    }

    function calculateFromPrice() {
      const price = parseFloat(priceInput.value) || 0;
      const remainingPool = getRemainingSubsidy();
      const rawGovShare = price * (ratioGov / 100);
      const actualGovShare = Math.min(rawGovShare, remainingPool);
      const actualUserShare = price - actualGovShare;

      valGov.value = price > 0 ? actualGovShare.toFixed(2) : '';
      valUser.value = price > 0 ? actualUserShare.toFixed(2) : '';

      updateCapAlert(price, rawGovShare, remainingPool);
    }

    function calculateFromGov() {
      let gov = parseFloat(valGov.value) || 0;
      const remainingPool = getRemainingSubsidy();

      if (gov > remainingPool) {
        gov = remainingPool;
        valGov.value = gov.toFixed(2);
      }

      const price = gov / (ratioGov / 100);
      const user = price * (ratioUser / 100);

      priceInput.value = gov > 0 ? price.toFixed(2) : '';
      valUser.value = gov > 0 ? user.toFixed(2) : '';

      const rawGov = price * (ratioGov / 100);
      updateCapAlert(price, rawGov, remainingPool);
    }

    function calculateFromUser() {
      const user = parseFloat(valUser.value) || 0;
      const remainingPool = getRemainingSubsidy();

      let price = 0;
      let gov = 0;

      const userShareAtCap = remainingPool * (ratioUser / ratioGov);

      if (user > userShareAtCap) {
        price = user + remainingPool;
        gov = remainingPool;
      } else {
        price = user / (ratioUser / 100);
        gov = price * (ratioGov / 100);
      }

      priceInput.value = user > 0 ? price.toFixed(2) : '';
      valGov.value = user > 0 ? gov.toFixed(2) : '';

      const rawGov = price * (ratioGov / 100);
      updateCapAlert(price, rawGov, remainingPool);
    }

    function updateTrackers() {
      const remaining = getRemainingSubsidy();
      if (document.activeElement !== remainingSubsidyInput) {
        remainingSubsidyInput.value = remaining.toFixed(2);
      }

      const optimal = remaining / (ratioGov / 100);
      optimalLimitVal.innerText = formatCurrency(optimal);
    }

    function formatCurrency(amount) {
      return '฿' + amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function resetCalculator() {
      priceInput.value = '';
      valGov.value = '';
      valUser.value = '';
      capAlert.style.display = 'none';
      priceInput.focus();
    }

    function saveCalculation() {
      const price = parseFloat(priceInput.value);
      if (isNaN(price) || price <= 0) return;

      const govShare = parseFloat(valGov.value) || 0;
      const userShare = parseFloat(valUser.value) || 0;
      const note = '';

      const logEntry = {
        id: Date.now(),
        price: price,
        govShare: govShare,
        userShare: userShare,
        ratioGov: ratioGov,
        ratioUser: ratioUser,
        note: note || `Expense Split`,
        date: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      };

      logs.unshift(logEntry);
      localStorage.setItem('halfhalf_logs', JSON.stringify(logs));
      resetCalculator();
      renderHistory();
      updateTrackers();
      
      // Auto open history drawer
      historyDrawer.classList.add('open');
    }

    // Numpad Logic
    let activeInput = priceInput;

    const numericInputs = [
      { input: priceInput, wrapper: document.querySelector('.price-input-wrapper') },
      { input: remainingSubsidyInput, wrapper: remainingSubsidyInput },
      { input: valGov, wrapper: document.getElementById('gov-val-wrapper') },
      { input: valUser, wrapper: document.getElementById('user-val-wrapper') }
    ];

    numericInputs.forEach(item => {
      // Focus tracking
      item.input.addEventListener('focus', () => {
        activeInput = item.input;
        numericInputs.forEach(x => x.wrapper.classList.remove('active-field'));
        item.wrapper.classList.add('active-field');
      });
      item.input.addEventListener('click', () => {
        activeInput = item.input;
        numericInputs.forEach(x => x.wrapper.classList.remove('active-field'));
        item.wrapper.classList.add('active-field');
      });

      // Desktop keyboard validation to prevent letters
      item.input.addEventListener('keydown', (e) => {
        if ([46, 8, 9, 27, 13, 110, 190].indexOf(e.keyCode) !== -1 ||
            (e.keyCode === 65 && (e.ctrlKey === true || e.metaKey === true)) ||
            (e.keyCode === 67 && (e.ctrlKey === true || e.metaKey === true)) ||
            (e.keyCode === 86 && (e.ctrlKey === true || e.metaKey === true)) ||
            (e.keyCode === 88 && (e.ctrlKey === true || e.metaKey === true)) ||
            (e.keyCode >= 35 && e.keyCode <= 39)) {
          if ((e.keyCode === 190 || e.keyCode === 110) && item.input.value.includes('.')) {
            e.preventDefault();
          }
          return;
        }
        if ((e.shiftKey || (e.keyCode < 48 || e.keyCode > 57)) && (e.keyCode < 96 || e.keyCode > 105)) {
          e.preventDefault();
        }
      });
    });

    // Numpad key interactions
    document.querySelectorAll('.numpad-btn').forEach(btn => {
      btn.addEventListener('mousedown', (e) => {
        e.preventDefault(); // Keep input focused
        if (!activeInput) return;

        const val = btn.getAttribute('data-val');
        const currentVal = activeInput.value;

        if (val === 'backspace') {
          if (currentVal.length > 0) {
            activeInput.value = currentVal.slice(0, -1);
          }
        } else if (val === '.') {
          if (!currentVal.includes('.')) {
            activeInput.value = currentVal === '' ? '0.' : currentVal + '.';
          }
        } else {
          if (currentVal === '0') {
            activeInput.value = val;
          } else {
            activeInput.value = currentVal + val;
          }
        }

        activeInput.dispatchEvent(new Event('input'));
      });
    });

    // Set active field outline on load
    priceInput.focus();
    document.querySelector('.price-input-wrapper').classList.add('active-field');

    // Initialize trackers
    updateTrackers();
    renderHistory();

    function deleteLog(id) {
      logs = logs.filter(log => log.id !== id);
      localStorage.setItem('halfhalf_logs', JSON.stringify(logs));
      renderHistory();
      updateTrackers();
      
      isCalculating = true;
      calculateFromPrice();
      isCalculating = false;
    }

    function clearAllLogs() {
      if (confirm('Clear all history?')) {
        logs = [];
        localStorage.setItem('halfhalf_logs', JSON.stringify(logs));
        renderHistory();
        updateTrackers();
        resetCalculator();
      }
    }

    function renderHistory() {
      const query = searchInput.value.toLowerCase();
      const filtered = logs.filter(log => 
        log.note.toLowerCase().includes(query) || 
        log.price.toString().includes(query)
      );

      if (logs.length > 0) {
        historyActionsBar.style.display = 'flex';
        searchBarWrapper.style.display = 'block';
      } else {
        historyActionsBar.style.display = 'none';
        searchBarWrapper.style.display = 'none';
      }

      if (filtered.length === 0) {
        historyList.innerHTML = `
          <div class="empty-state">
            ${logs.length > 0 ? 'No matching records.' : 'No records yet. Enter a value and save it.'}
          </div>
        `;
        return;
      }

      historyList.innerHTML = filtered.map(log => `
        <div class="log-item">
          <div class="log-left">
            <span class="log-orig-price">${formatCurrency(log.price)}</span>
            <div class="log-splits">
              <span>Gov (${log.ratioGov}%): ${formatCurrency(log.govShare)}</span>
              <span>You (${log.ratioUser}%): ${formatCurrency(log.userShare)}</span>
            </div>
            ${log.note ? `<div class="log-note">${escapeHTML(log.note)}</div>` : ''}
          </div>
          <div class="log-right">
            <span class="log-date">${log.date}</span>
            <button class="log-delete" onclick="deleteLog(${log.id})" title="Delete">
              <i data-lucide="x-circle" style="width: 14px; height: 14px;"></i>
            </button>
          </div>
        </div>
      `).join('');

      lucide.createIcons();
    }

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }

    function exportToCSV() {
      if (logs.length === 0) return;
      let csvContent = "data:text/csv;charset=utf-8,Date,Original Price,Government Share,User Share,Gov Ratio,User Ratio,Label/Note\n";
      logs.forEach(log => {
        const escapedNote = log.note.replace(/"/g, '""');
        csvContent += `"${log.date}",${log.price.toFixed(2)},${log.govShare.toFixed(2)},${log.userShare.toFixed(2)},${log.ratioGov},${log.ratioUser},"${escapedNote}"\n`;
      });

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `co_pay_split_nordic_${Date.now()}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Initialize trackers
    updateTrackers();
    renderHistory();

    // Theme toggle interaction
    const themeToggleBtn = document.getElementById('theme-toggle-btn');
    
    function initThemeColor() {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const color = isDark ? '#0b0f19' : '#f5f5f7';
      document.querySelectorAll('meta[name="theme-color"]').forEach(meta => {
        meta.setAttribute('content', color);
      });
    }
    
    initThemeColor();

    if (themeToggleBtn) {
      themeToggleBtn.addEventListener('click', () => {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        if (isDark) {
          document.documentElement.removeAttribute('data-theme');
          localStorage.setItem('halfhalf_theme', 'light');
        } else {
          document.documentElement.setAttribute('data-theme', 'dark');
          localStorage.setItem('halfhalf_theme', 'dark');
        }
        initThemeColor();
      });
    }

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered successfully:', reg.scope))
          .catch(err => console.log('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
