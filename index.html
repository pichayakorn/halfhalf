<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HalfHalf</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Favicon / App Icon -->
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f8fafc">
  <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: dark)">
  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="HalfHalf">
  <link rel="apple-touch-icon" href="icon-solid.png">
  <!-- Lucide Icons (CDN) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg-color: #f8fafc;
      --card-bg: #ffffff;
      --card-border: #e2e8f0;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --gov-color: #0284c7; /* Light Sky Blue */
      --gov-bg-light: #f0f9ff;
      --user-color: #d97706; /* Warm Amber/Orange */
      --user-bg-light: #fffbeb;
      --accent: #0284c7;
      --input-bg: #f1f5f9;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: calc(env(safe-area-inset-top, 24px) + 36px) 16px 24px 16px;
    }

    .app-container {
      width: 100%;
      max-width: 440px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 36px 30px;
      box-shadow: 0 4px 24px rgba(15, 23, 42, 0.04);
      position: relative;
      overflow: hidden;
    }



    .header {
      text-align: left;
      margin-bottom: 24px;
    }

    .header h1 {
      font-family: 'Inter', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      color: var(--text-main);
      line-height: 1.1;
      letter-spacing: -0.03em;
    }

    .header p {
      color: var(--text-muted);
      font-size: 0.875rem;
      margin-top: 6px;
      letter-spacing: -0.01em;
    }

    /* Subsidy Balance Box */
    .balance-box {
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 18px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--input-bg);
    }

    .bal-left {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .bal-title {
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .bal-val-wrapper {
      display: flex;
      align-items: center;
      gap: 2px;
      margin-top: 2px;
    }

    .bal-currency {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--gov-color);
    }

    .bal-val-input {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--gov-color);
      background: transparent;
      border: none;
      border-bottom: 1px dashed rgba(2, 132, 199, 0.4);
      outline: none;
      width: 75px;
      font-family: inherit;
      padding: 0;
      transition: border-color 0.2s ease;
    }

    .bal-val-input:focus {
      border-bottom-color: var(--gov-color);
    }

    .bal-val-input::-webkit-outer-spin-button,
    .bal-val-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .bal-val-input[type=number] {
      -moz-appearance: textfield;
    }

    /* Settings section */
    .settings-section {
      background: var(--input-bg);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .settings-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .setting-group {
      margin-bottom: 0;
    }

    .setting-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .cap-input-wrapper {
      display: flex;
      align-items: center;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 8px 12px;
    }

    .cap-input-wrapper span {
      font-size: 0.8125rem;
      color: var(--text-muted);
      margin-right: 4px;
    }

    .cap-input {
      border: none;
      background: transparent;
      outline: none;
      color: var(--text-main);
      font-size: 0.8125rem;
      font-weight: 600;
      width: 100%;
    }
    .cap-input::-webkit-outer-spin-button,
    .cap-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .cap-input[type=number] {
      -moz-appearance: textfield;
    }

    .bal-limit {
      font-size: 0.6875rem;
      color: var(--text-muted);
      text-align: right;
    }

    .bal-limit span {
      font-weight: 600;
      color: var(--text-main);
    }



    /* Input styling */
    .input-section {
      margin-bottom: 24px;
    }

    .input-container {
      text-align: center;
      margin-bottom: 16px;
    }

    .input-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
      display: block;
    }

    .price-input-wrapper {
      display: inline-flex;
      align-items: baseline;
      justify-content: center;
      border-bottom: 2px solid var(--text-main);
      padding: 8px 0;
      width: 100%;
      max-width: 260px;
      transition: border-color 0.2s ease;
    }

    .price-input-wrapper:focus-within {
      border-color: var(--gov-color);
    }

    .currency-symbol {
      font-size: 2rem;
      font-family: 'Instrument Serif', serif;
      color: var(--text-muted);
      margin-right: 4px;
    }

    .price-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      font-size: 2.25rem;
      font-weight: 500;
      width: 160px;
      text-align: center;
    }

    .price-input::placeholder {
      color: #cbd5e1;
    }

    .price-input::-webkit-outer-spin-button,
    .price-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .price-input[type=number] {
      -moz-appearance: textfield;
    }

    /* Note and Presets */
    .note-wrapper {
      margin-top: 14px;
    }

    .note-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--text-main);
      font-size: 0.8125rem;
      outline: none;
      text-align: center;
      transition: all 0.2s ease;
    }

    .note-input:focus {
      background: var(--card-bg);
      border-color: var(--card-border);
    }



    /* Results Block */
    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .result-box {
      border-radius: 12px;
      padding: 18px 12px;
      text-align: center;
    }

    .result-box.gov {
      background-color: var(--gov-bg-light);
      border: 1px solid rgba(2, 132, 199, 0.1);
    }

    .result-box.user {
      background-color: var(--user-bg-light);
      border: 1px solid rgba(217, 119, 6, 0.1);
    }

    .result-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .result-box.gov .result-label { color: var(--gov-color); }
    .result-box.user .result-label { color: var(--user-color); }

    .result-val-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .result-val-wrapper span {
      font-family: 'Instrument Serif', serif;
      font-size: 1.5rem;
      margin-right: 2px;
    }

    .result-val-wrapper.gov span { color: var(--gov-color); }
    .result-val-wrapper.user span { color: var(--user-color); }

    .result-input {
      background: transparent;
      border: none;
      outline: none;
      font-size: 1.4rem;
      font-weight: 600;
      width: 100%;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .result-input.gov { color: var(--gov-color); }
    .result-input.user { color: var(--user-color); }

    .result-input::-webkit-outer-spin-button,
    .result-input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    .result-input[type=number] {
      -moz-appearance: textfield;
    }

    .cap-alert {
      grid-column: span 2;
      font-size: 0.75rem;
      color: var(--user-color);
      text-align: center;
      font-style: italic;
      margin-top: -8px;
    }

    /* Visual slider segment */
    .visual-split {
      height: 6px;
      border-radius: 10px;
      background: var(--input-bg);
      display: flex;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .split-gov {
      width: 60%;
      background-color: var(--gov-color);
    }

    .split-user {
      width: 40%;
      background-color: var(--user-color);
    }

    /* Action buttons */
    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
    }

    .btn {
      flex: 1;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: var(--text-main);
      color: var(--card-bg);
      border: none;
    }

    .btn-primary:hover {
      background: #1e293b;
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-muted);
    }

    .btn-secondary:hover {
      border-color: var(--text-main);
      color: var(--text-main);
    }

    /* History section */
    .history-section {
      border-top: 1px solid var(--card-border);
      padding-top: 24px;
    }

    .history-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .history-title {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .history-actions {
      display: flex;
      gap: 6px;
    }

    .action-icon-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      transition: color 0.2s ease;
    }

    .action-icon-btn:hover {
      color: var(--text-main);
    }

    /* Search logs */
    .search-container {
      position: relative;
      margin-bottom: 12px;
    }

    .search-input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 6px 10px 6px 28px;
      font-size: 0.75rem;
      color: var(--text-main);
      outline: none;
    }

    .search-input:focus {
      background: var(--card-bg);
      border-color: var(--card-border);
    }

    .search-icon {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      width: 12px;
      height: 12px;
    }

    /* Log Items */
    .log-list {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* History Drawer sliding out */
    .history-drawer {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      background: var(--card-bg);
      border-left: 1px solid var(--card-border);
      border-radius: 16px;
      z-index: 100;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      padding: 36px 30px;
      box-sizing: border-box;
    }

    .history-drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 12px;
    }

    .drawer-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-main);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .drawer-close-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      transition: color 0.2s ease;
    }

    .drawer-close-btn:hover {
      color: var(--user-color);
    }

    .hamburger-btn {
      position: absolute;
      top: 36px;
      right: 30px;
      background: transparent;
      border: 1px solid var(--card-border);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted);
      cursor: pointer;
      z-index: 10;
      transition: all 0.2s ease;
    }

    .hamburger-btn:hover {
      border-color: var(--text-main);
      color: var(--text-main);
    }

    .log-list::-webkit-scrollbar {
      width: 3px;
    }

    .log-list::-webkit-scrollbar-thumb {
      background: var(--card-border);
      border-radius: 2px;
    }

    .log-item {
      padding: 10px;
      border: 1px solid var(--card-border);
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8125rem;
      transition: border-color 0.2s ease;
    }

    .log-item:hover {
      border-color: var(--text-main);
    }

    .log-left {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .log-price-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .log-orig-price {
      font-weight: 600;
    }

    .log-note {
      font-size: 0.75rem;
      color: var(--text-muted);
      max-width: 180px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .log-splits {
      font-size: 0.7rem;
      color: var(--text-muted);
      display: flex;
      gap: 8px;
    }

    .log-splits span:first-child { color: var(--gov-color); font-weight: 500; }
    .log-splits span:last-child { color: var(--user-color); font-weight: 500; }

    .log-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .log-date {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .log-delete {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      transition: color 0.2s ease;
    }

    .log-delete:hover {
      color: var(--user-color);
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.75rem;
      padding: 24px;
    }

    @media (max-width: 480px) {
      body {
        padding: 0;
        background-color: var(--card-bg);
        align-items: stretch;
        overflow: hidden;
      }

      .app-container {
        height: 100vh;
        height: -webkit-fill-available;
        border: none;
        border-radius: 0;
        box-shadow: none;
        padding: 20px 20px 24px 20px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        overflow: hidden;
      }

      .hamburger-btn {
        top: 20px;
        right: 20px;
      }

      .header {
        margin-top: 12px;
        margin-bottom: 16px;
      }

      .header h1 {
        font-size: 2.2rem;
      }

      .balance-box {
        margin-bottom: 16px;
        padding: 12px 14px;
      }

      .input-section {
        margin-bottom: 16px;
      }

      .visual-split {
        margin-bottom: 16px;
      }

      .results-grid {
        margin-bottom: 16px;
        gap: 12px;
      }

      .actions {
        margin-bottom: 0;
      }

      .history-drawer {
        border-radius: 0;
        border-left: none;
        padding: 24px 20px;
      }
    }

  </style>
</head>
<body>



  <div class="app-container">
    <button class="hamburger-btn" id="drawer-open-btn" title="Saved Splits">
      <i data-lucide="menu" style="width: 16px; height: 16px;"></i>
    </button>



    <div class="header">
      <h1>HalfHalf</h1>
      <p>Clean, dual-ratio expenses with cap limits</p>
    </div>

    <!-- Subsidy Tracker -->
    <div class="balance-box">
      <div class="bal-left">
        <span class="bal-title">Available Subsidy</span>
        <div class="bal-val-wrapper">
          <span class="bal-currency">฿</span>
          <input type="number" id="remaining-subsidy-input" class="bal-val-input" value="200.00" min="0" step="any">
        </div>
      </div>
      <div class="bal-limit">
        Optimal Limit<br>
        <span>Max: <span id="optimal-limit-val">฿333.33</span></span>
      </div>
    </div>

    <!-- Input Box -->
    <div class="input-section">
      <div class="input-container">
        <label class="input-label" for="original-price">Amount to Split (60/40 Ratio)</label>
        <div class="price-input-wrapper">
          <span class="currency-symbol">฿</span>
          <input type="number" id="original-price" class="price-input" placeholder="0.00" min="0" step="any" autofocus>
        </div>
      </div>

      <input type="text" id="calc-note" class="note-input" placeholder="Name this calculation (optional)">


    </div>

    <!-- Visual Divider -->
    <div class="visual-split">
      <div class="split-gov" id="gov-bar-segment" style="width: 60%"></div>
      <div class="split-user" id="user-bar-segment" style="width: 40%"></div>
    </div>

    <!-- Calculated Split Boxes -->
    <div class="results-grid">
      <div class="result-box gov">
        <div class="result-label">Gov Support (60%)</div>
        <div class="result-val-wrapper gov">
          <span>฿</span>
          <input type="number" id="val-gov" class="result-input gov" placeholder="0.00" min="0" step="any">
        </div>
      </div>
      <div class="result-box user">
        <div class="result-label">Your Share (40%)</div>
        <div class="result-val-wrapper user">
          <span>฿</span>
          <input type="number" id="val-user" class="result-input user" placeholder="0.00" min="0" step="any">
        </div>
      </div>
      <div class="cap-alert" id="cap-alert" style="display: none;">
        * Government cap reached! You pay the rest on top.
      </div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button class="btn btn-primary" onclick="saveCalculation()">
        <i data-lucide="plus" style="width: 14px; height: 14px;"></i>
        Record Split
      </button>
      <button class="btn btn-secondary" onclick="resetCalculator()">
        Reset
      </button>
    </div>

    <!-- Footer / Credits -->
    <div class="app-footer" style="text-align: center; font-size: 0.7rem; color: var(--text-muted); margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--card-border);">
      Made by <a href="https://github.com/pichayakorn" target="_blank" rel="noopener noreferrer" style="color: var(--text-main); text-decoration: none; font-weight: 500;">pichayakorn</a>
    </div>

    <!-- History Drawer (Slides in from the right) -->
    <div class="history-drawer" id="history-drawer">
      <div class="drawer-header">
        <span class="drawer-title">
          <i data-lucide="history" style="width: 16px; height: 16px; color: var(--gov-color)"></i>
          Menu & Calculations
        </span>
        <button class="drawer-close-btn" id="drawer-close-btn" title="Close Drawer">
          <i data-lucide="x" style="width: 16px; height: 16px;"></i>
        </button>
      </div>



      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
        <span style="font-size: 0.7rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">Logs Archive</span>
        <div class="history-actions" id="history-actions-bar" style="display: none; gap: 6px;">
          <button class="action-icon-btn" title="Export CSV" onclick="exportToCSV()">
            <i data-lucide="download" style="width: 14px; height: 14px;"></i>
          </button>
          <button class="action-icon-btn" title="Clear all" onclick="clearAllLogs()">
            <i data-lucide="trash-2" style="width: 14px; height: 14px;"></i>
          </button>
        </div>
      </div>

      <div class="search-container" id="search-bar-wrapper" style="display: none; margin-bottom: 12px;">
        <i data-lucide="search" class="search-icon"></i>
        <input type="text" id="search-input" class="search-input" placeholder="Search calculations..." oninput="renderHistory()">
      </div>

      <div class="log-list" id="history-list">
        <div class="empty-state">
          No records yet. Enter a value and save it.
        </div>
      </div>
    </div>
  </div>

  <script>
    // Initialize Lucide Icons
    lucide.createIcons();

    // iOS Safari Keyboard Scroll Bug Fix
    // When inputs lose focus, force the window to scroll back to top (0,0)
    // to correct the layout shift caused by the virtual keyboard.
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || 
                  (/Mac/.test(navigator.userAgent) && navigator.maxTouchPoints > 1);
    if (isIOS) {
      document.addEventListener('focusout', (e) => {
        if (e.target.tagName === 'INPUT') {
          window.scrollTo(0, 0);
        }
      });
    }

    // App State
    let logs = JSON.parse(localStorage.getItem('halfhalf_logs')) || [];
    const ratioGov = 60; // Fixed 60%
    const ratioUser = 40; // Fixed 40%
    let dailyCap = parseFloat(localStorage.getItem('halfhalf_daily_cap')) || 200.00;
    let isCalculating = false;

    // Elements
    const priceInput = document.getElementById('original-price');
    const calcNote = document.getElementById('calc-note');
    const valGov = document.getElementById('val-gov');
    const valUser = document.getElementById('val-user');
    const historyList = document.getElementById('history-list');
    const searchInput = document.getElementById('search-input');
    const historyActionsBar = document.getElementById('history-actions-bar');
    const searchBarWrapper = document.getElementById('search-bar-wrapper');

    // Drawer Elements
    const historyDrawer = document.getElementById('history-drawer');
    const drawerOpenBtn = document.getElementById('drawer-open-btn');
    const drawerCloseBtn = document.getElementById('drawer-close-btn');

    // Tracker elements
    const remainingSubsidyInput = document.getElementById('remaining-subsidy-input');
    const optimalLimitVal = document.getElementById('optimal-limit-val');
    const capAlert = document.getElementById('cap-alert');

    // Event Listeners
    priceInput.addEventListener('input', () => {
      if (isCalculating) return;
      isCalculating = true;
      calculateFromPrice();
      isCalculating = false;
    });

    valGov.addEventListener('input', () => {
      if (isCalculating) return;
      isCalculating = true;
      calculateFromGov();
      isCalculating = false;
    });

    valUser.addEventListener('input', () => {
      if (isCalculating) return;
      isCalculating = true;
      calculateFromUser();
      isCalculating = false;
    });

    remainingSubsidyInput.addEventListener('input', () => {
      const remainingVal = parseFloat(remainingSubsidyInput.value) || 0;
      const usedToday = logs.reduce((sum, item) => sum + item.govShare, 0);
      dailyCap = remainingVal + usedToday;
      localStorage.setItem('halfhalf_daily_cap', dailyCap.toString());
      
      isCalculating = true;
      calculateFromPrice();
      isCalculating = false;

      updateTrackers();
    });

    remainingSubsidyInput.addEventListener('blur', () => {
      updateTrackers();
    });



    // Drawer Event Listeners
    drawerOpenBtn.addEventListener('click', () => {
      historyDrawer.classList.add('open');
    });

    drawerCloseBtn.addEventListener('click', () => {
      historyDrawer.classList.remove('open');
    });

    function getRemainingSubsidy() {
      const usedToday = logs.reduce((sum, item) => sum + item.govShare, 0);
      return Math.max(0, dailyCap - usedToday);
    }

    function calculateFromPrice() {
      const price = parseFloat(priceInput.value) || 0;
      const remainingPool = getRemainingSubsidy();
      const rawGovShare = price * (ratioGov / 100);
      const actualGovShare = Math.min(rawGovShare, remainingPool);
      const actualUserShare = price - actualGovShare;

      valGov.value = price > 0 ? actualGovShare.toFixed(2) : '';
      valUser.value = price > 0 ? actualUserShare.toFixed(2) : '';

      const singleCapReached = rawGovShare > remainingPool;
      capAlert.style.display = (price > 0 && singleCapReached) ? 'block' : 'none';
    }

    function calculateFromGov() {
      let gov = parseFloat(valGov.value) || 0;
      const remainingPool = getRemainingSubsidy();

      if (gov > remainingPool) {
        gov = remainingPool;
        valGov.value = gov.toFixed(2);
      }

      const price = gov / (ratioGov / 100);
      const user = price * (ratioUser / 100);

      priceInput.value = gov > 0 ? price.toFixed(2) : '';
      valUser.value = gov > 0 ? user.toFixed(2) : '';

      const rawGov = price * (ratioGov / 100);
      const singleCapReached = rawGov > remainingPool || gov === remainingPool;
      capAlert.style.display = (gov > 0 && singleCapReached) ? 'block' : 'none';
    }

    function calculateFromUser() {
      const user = parseFloat(valUser.value) || 0;
      const remainingPool = getRemainingSubsidy();

      let price = 0;
      let gov = 0;

      const userShareAtCap = remainingPool * (ratioUser / ratioGov);

      if (user > userShareAtCap) {
        price = user + remainingPool;
        gov = remainingPool;
      } else {
        price = user / (ratioUser / 100);
        gov = price * (ratioGov / 100);
      }

      priceInput.value = user > 0 ? price.toFixed(2) : '';
      valGov.value = user > 0 ? gov.toFixed(2) : '';

      const rawGov = price * (ratioGov / 100);
      const singleCapReached = rawGov > remainingPool;
      capAlert.style.display = (user > 0 && singleCapReached) ? 'block' : 'none';
    }

    function updateTrackers() {
      const remaining = getRemainingSubsidy();
      if (document.activeElement !== remainingSubsidyInput) {
        remainingSubsidyInput.value = remaining.toFixed(2);
      }

      const optimal = remaining / (ratioGov / 100);
      optimalLimitVal.innerText = formatCurrency(optimal);
    }

    function formatCurrency(amount) {
      return '฿' + amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }



    function resetCalculator() {
      priceInput.value = '';
      valGov.value = '';
      valUser.value = '';
      calcNote.value = '';
      capAlert.style.display = 'none';
      priceInput.focus();
    }

    function saveCalculation() {
      const price = parseFloat(priceInput.value);
      if (isNaN(price) || price <= 0) return;

      const govShare = parseFloat(valGov.value) || 0;
      const userShare = parseFloat(valUser.value) || 0;
      const note = calcNote.value.trim();

      const logEntry = {
        id: Date.now(),
        price: price,
        govShare: govShare,
        userShare: userShare,
        ratioGov: ratioGov,
        ratioUser: ratioUser,
        note: note || `Expense Split`,
        date: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      };

      logs.unshift(logEntry);
      localStorage.setItem('halfhalf_logs', JSON.stringify(logs));
      resetCalculator();
      renderHistory();
      updateTrackers();
      
      // Auto open history drawer
      historyDrawer.classList.add('open');
    }

    function deleteLog(id) {
      logs = logs.filter(log => log.id !== id);
      localStorage.setItem('halfhalf_logs', JSON.stringify(logs));
      renderHistory();
      updateTrackers();
      
      isCalculating = true;
      calculateFromPrice();
      isCalculating = false;
    }

    function clearAllLogs() {
      if (confirm('Clear all history?')) {
        logs = [];
        localStorage.setItem('halfhalf_logs', JSON.stringify(logs));
        renderHistory();
        updateTrackers();
        resetCalculator();
      }
    }

    function renderHistory() {
      const query = searchInput.value.toLowerCase();
      const filtered = logs.filter(log => 
        log.note.toLowerCase().includes(query) || 
        log.price.toString().includes(query)
      );

      if (logs.length > 0) {
        historyActionsBar.style.display = 'flex';
        searchBarWrapper.style.display = 'block';
      } else {
        historyActionsBar.style.display = 'none';
        searchBarWrapper.style.display = 'none';
      }

      if (filtered.length === 0) {
        historyList.innerHTML = `
          <div class="empty-state">
            ${logs.length > 0 ? 'No matching records.' : 'No records yet. Enter a value and save it.'}
          </div>
        `;
        return;
      }

      historyList.innerHTML = filtered.map(log => `
        <div class="log-item">
          <div class="log-left">
            <div class="log-price-row">
              <span class="log-orig-price">${formatCurrency(log.price)}</span>
              <span class="log-splits">
                <span>Gov (${log.ratioGov}%): ${formatCurrency(log.govShare)}</span>
                <span>You (${log.ratioUser}%): ${formatCurrency(log.userShare)}</span>
              </span>
            </div>
            ${log.note ? `<div class="log-note">${escapeHTML(log.note)}</div>` : ''}
          </div>
          <div class="log-right">
            <span class="log-date">${log.date}</span>
            <button class="log-delete" onclick="deleteLog(${log.id})" title="Delete">
              <i data-lucide="x-circle" style="width: 14px; height: 14px;"></i>
            </button>
          </div>
        </div>
      `).join('');

      lucide.createIcons();
    }

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
      );
    }

    function exportToCSV() {
      if (logs.length === 0) return;
      let csvContent = "data:text/csv;charset=utf-8,Date,Original Price,Government Share,User Share,Gov Ratio,User Ratio,Label/Note\n";
      logs.forEach(log => {
        const escapedNote = log.note.replace(/"/g, '""');
        csvContent += `"${log.date}",${log.price.toFixed(2)},${log.govShare.toFixed(2)},${log.userShare.toFixed(2)},${log.ratioGov},${log.ratioUser},"${escapedNote}"\n`;
      });

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `co_pay_split_nordic_${Date.now()}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Initialize trackers
    updateTrackers();
    renderHistory();

    // Register Service Worker for PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registered successfully:', reg.scope))
          .catch(err => console.log('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
